<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Админка · Grand Camellia</title>
    <link href="https://fonts.cdnfonts.com/css/circular-std" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #ff385c;
            --fg: #222222;
            --muted: #6a6a6a;
            --border: #ebebeb;
            --bg: #ffffff;
            --bg2: #f7f7f7;
            --radius: 14px;
        }

        body {
            font-family: 'Circular Std', 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg2);
            color: var(--fg);
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Login ──────────────────────────────────────────── */
        .login-wrap {
            display: flex; align-items: center; justify-content: center;
            min-height: 100dvh; padding: 24px;
        }
        .login-card {
            background: var(--bg); border-radius: var(--radius);
            border: 1px solid var(--border); padding: 40px 32px;
            max-width: 420px; width: 100%; text-align: center;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        .login-card h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.3px; }
        .login-card .sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
        .login-card label { display: block; text-align: left; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        .login-card input {
            width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
            border-radius: 10px; font-family: inherit; font-size: 14px;
            outline: none; transition: border-color 0.15s;
        }
        .login-card input:focus { border-color: var(--accent); }
        .login-card button {
            margin-top: 16px; width: 100%; padding: 13px 0;
            background: var(--accent); color: #fff; border: none;
            border-radius: 10px; font-family: inherit; font-size: 15px;
            font-weight: 500; cursor: pointer; transition: background 0.12s;
        }
        .login-card button:hover { background: #e00b41; }
        .login-card .help { margin-top: 16px; font-size: 12px; color: var(--muted); line-height: 1.5; }
        .login-card .help a { color: var(--accent); }
        .login-error { color: #c13515; font-size: 13px; margin-top: 10px; display: none; }

        /* ─── Editor layout ───────────────────────────────────── */
        .editor { display: none; }
        .editor.show { display: block; }

        .topbar {
            background: var(--bg); border-bottom: 1px solid var(--border);
            padding: 0 24px; display: flex; align-items: center;
            gap: 16px; height: 56px; position: sticky; top: 0; z-index: 10;
        }
        .topbar .brand { font-weight: 600; font-size: 15px; white-space: nowrap; }
        .topbar .tabs { display: flex; gap: 4px; flex: 1; overflow-x: auto; }
        .topbar .tab {
            padding: 8px 14px; border-radius: 8px; font-family: inherit;
            font-size: 13px; font-weight: 500; border: none; background: transparent;
            cursor: pointer; white-space: nowrap; color: var(--muted); transition: all 0.12s;
        }
        .topbar .tab:hover { background: var(--bg2); color: var(--fg); }
        .topbar .tab.active { background: var(--fg); color: #fff; }
        .topbar .actions { display: flex; gap: 8px; align-items: center; margin-left: auto; }
        .btn-save {
            padding: 8px 20px; border-radius: 20px; font-family: inherit;
            font-size: 14px; font-weight: 500; border: none; cursor: pointer;
            background: var(--accent); color: #fff; transition: all 0.12s;
            white-space: nowrap;
        }
        .btn-save:hover { background: #e00b41; }
        .btn-save:disabled { opacity: 0.5; cursor: default; }
        .btn-logout {
            padding: 8px 14px; border-radius: 20px; font-family: inherit;
            font-size: 13px; font-weight: 500; border: 1.5px solid var(--border);
            cursor: pointer; background: var(--bg); color: var(--muted); transition: all 0.12s;
        }
        .btn-logout:hover { border-color: var(--fg); color: var(--fg); }

        .save-status {
            font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px;
        }
        .save-status.success { color: #1a8a3f; }
        .save-status.error { color: #c13515; }
        .spinner {
            width: 16px; height: 16px; border: 2px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.6s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Tab content ─────────────────────────────────────── */
        .tab-content { display: none; padding: 24px; }
        .tab-content.active { display: flex; gap: 24px; }

        .tab-main { flex: 1; min-width: 0; }

        .tab-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
        }
        .tab-header h2 { font-size: 18px; font-weight: 600; }

        .btn-add {
            padding: 10px 20px; border-radius: 20px; font-family: inherit;
            font-size: 13px; font-weight: 500; border: 1.5px solid var(--border);
            cursor: pointer; background: var(--bg); color: var(--fg); transition: all 0.12s;
        }
        .btn-add:hover { border-color: var(--fg); }

        /* ─── Image cards ──────────────────────────────────────── */
        .card-list { display: flex; flex-direction: column; gap: 12px; }

        .img-card {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px; display: flex;
            gap: 16px; align-items: flex-start; transition: border-color 0.12s;
        }
        .img-card:hover { border-color: #ccc; }
        .img-card .thumb {
            width: 140px; height: 93px; border-radius: 8px;
            object-fit: cover; background: var(--bg2); flex-shrink: 0;
            border: 1px solid var(--border);
        }
        .img-card .thumb[src=""] { display: none; }
        .img-card .fields { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
        .img-card .fields input, .img-card .fields textarea {
            width: 100%; padding: 8px 12px; border: 1.5px solid var(--border);
            border-radius: 8px; font-family: inherit; font-size: 13px; outline: none;
            transition: border-color 0.12s; resize: vertical;
        }
        .img-card .fields input:focus, .img-card .fields textarea:focus { border-color: var(--accent); }
        .img-card .fields textarea { min-height: 36px; }
        .img-card .src-row { display: flex; gap: 8px; align-items: center; }
        .img-card .src-row input { flex: 1; font-size: 12px; color: var(--muted); }
        .img-card .src-row .btn-pick {
            padding: 6px 12px; border-radius: 6px; font-family: inherit;
            font-size: 12px; font-weight: 500; border: 1.5px solid var(--border);
            cursor: pointer; background: var(--bg); color: var(--fg);
            white-space: nowrap; transition: all 0.12s;
        }
        .img-card .src-row .btn-pick:hover { border-color: var(--fg); }
        .img-card .card-actions { display: flex; gap: 4px; flex-direction: column; align-items: center; }
        .img-card .card-actions button {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg); cursor: pointer; font-size: 14px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            color: var(--muted); transition: all 0.12s;
        }
        .img-card .card-actions button:hover { border-color: var(--fg); color: var(--fg); }
        .img-card .card-actions button:disabled { opacity: 0.3; cursor: default; }
        .img-card .card-actions button.del:hover { border-color: #c13515; color: #c13515; }
        .img-card .index-badge {
            width: 28px; height: 28px; border-radius: 50%; background: var(--bg2);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; color: var(--muted); flex-shrink: 0;
        }

        /* ─── Single-image tab (Food, Location) ────────────────── */
        .single-img { max-width: 480px; }
        .single-img .thumb-big {
            width: 100%; height: auto; max-height: 260px; border-radius: 10px;
            background: var(--bg2); border: 1px solid var(--border);
        }
        .single-img .src-row { margin-top: 12px; display: flex; gap: 8px; }
        .single-img .src-row input { flex: 1; }
        .single-img .src-row input {
            padding: 8px 12px; border: 1.5px solid var(--border);
            border-radius: 8px; font-family: inherit; font-size: 13px; outline: none;
        }
        .single-img .src-row input:focus { border-color: var(--accent); }
        .single-img .btn-pick {
            padding: 8px 16px; border-radius: 8px; font-family: inherit;
            font-size: 13px; font-weight: 500; border: 1.5px solid var(--border);
            cursor: pointer; background: var(--bg); color: var(--fg);
            white-space: nowrap; transition: all 0.12s;
        }
        .single-img .btn-pick:hover { border-color: var(--fg); }

        /* ─── Photo gallery sidebar ────────────────────────────── */
        .tab-sidebar { width: 260px; flex-shrink: 0; }
        .photo-gallery-sidebar {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 14px; position: sticky; top: 80px;
            max-height: calc(100dvh - 100px); overflow-y: auto;
        }
        .photo-gallery-sidebar h3 {
            font-size: 13px; font-weight: 600; margin-bottom: 4px;
        }
        .photo-gallery-sidebar .gh-link {
            font-size: 11px; color: var(--accent); display: block; margin-bottom: 10px;
        }
        .photo-gallery-sidebar .gh-link:hover { text-decoration: underline; }
        .photo-gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
        }
        .photo-gallery-grid .gthumb {
            width: 100%; aspect-ratio: 4/3; border-radius: 4px; cursor: pointer;
            border: 2px solid transparent; object-fit: cover; object-position: center;
            background: var(--bg2); transition: border-color 0.12s;
            /* Prevent huge downloads from blowing layout */
            max-height: 80px;
        }
        .photo-gallery-grid .gthumb:hover { border-color: var(--accent); }
        .photo-gallery-grid .gthumb.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,56,92,0.2); }
        .photo-gallery-sidebar .empty-msg { font-size: 11px; color: var(--muted); text-align: center; padding: 16px 0; }
        .photo-gallery-sidebar .upload-btn {
            display: block; width: 100%; margin-top: 10px; padding: 8px 0;
            border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 500;
            border: 1.5px dashed var(--border); cursor: pointer;
            background: var(--bg2); color: var(--fg); transition: all 0.12s; text-align: center;
        }
        .photo-gallery-sidebar .upload-btn:hover { border-color: var(--accent); color: var(--accent); }
        .photo-gallery-sidebar .upload-status {
            font-size: 11px; color: var(--muted); margin-top: 6px; text-align: center;
        }

        /* ─── Responsive ───────────────────────────────────────── */
        @media (max-width: 1100px) {
            .tab-sidebar { width: 220px; }
            .photo-gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .photo-gallery-grid .gthumb { max-height: 72px; }
        }
        @media (max-width: 900px) {
            .tab-content { flex-direction: column; }
            .tab-sidebar { width: 100%; }
            .photo-gallery-sidebar { position: static; max-height: 240px; }
            .photo-gallery-grid { grid-template-columns: repeat(6, 1fr); }
            .photo-gallery-grid .gthumb { max-height: 64px; }
        }
        @media (max-width: 640px) {
            .topbar { padding: 0 12px; gap: 8px; overflow-x: auto; }
            .topbar .tabs { gap: 0; }
            .topbar .tab { padding: 6px 10px; font-size: 12px; }
            .topbar .brand { display: none; }
            .img-card { flex-wrap: wrap; }
            .img-card .thumb { width: 100%; height: 160px; }
            .img-card .card-actions { flex-direction: row; order: -1; }
            .card-list { gap: 8px; }
            .photo-gallery-grid { grid-template-columns: repeat(4, 1fr); }
            .photo-gallery-grid .gthumb { max-height: 56px; }
        }
    </style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="login-wrap" id="login-screen">
    <div class="login-card">
        <h1>Админка Grand&nbsp;Camellia</h1>
        <p class="sub">Управление фото на сайте gcamellia.ru</p>
        <label for="token-input">GitHub Personal Access Token</label>
        <input id="token-input" type="password" placeholder="ghp_…" autocomplete="off">
        <button onclick="login()">Войти</button>
        <p class="login-error" id="login-error"></p>
        <p class="help">
            Нужен токен с доступом <code>repo</code>.<br>
            <a href="https://github.com/settings/tokens/new?scopes=repo&description=gcamellia-admin" target="_blank" rel="noopener">Создать токен →</a>
            &nbsp;·&nbsp; Кнопка «Generate new token (classic)» → срок 90 дней.
        </p>
    </div>
</div>

<!-- ═══ EDITOR ═══ -->
<div class="editor" id="editor-screen">
    <div class="topbar">
        <span class="brand">GC Admin</span>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('hero')">Слайдер</button>
            <button class="tab" onclick="switchTab('infra')">Территория</button>
            <button class="tab" onclick="switchTab('food')">Ресторан</button>
            <button class="tab" onclick="switchTab('rooms')">Номера</button>
            <button class="tab" onclick="switchTab('location')">Карта</button>
        </div>
        <div class="actions">
            <span class="save-status" id="save-status"></span>
            <div class="spinner" id="spinner"></div>
            <button class="btn-save" id="btn-save" onclick="saveAll()">💾 Сохранить всё</button>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
    </div>

    <!-- Hero slides -->
    <div class="tab-content active" id="tab-hero"></div>
    <!-- Infrastructure gallery -->
    <div class="tab-content" id="tab-infra"></div>
    <!-- Food background -->
    <div class="tab-content" id="tab-food"></div>
    <!-- Rooms cards -->
    <div class="tab-content" id="tab-rooms"></div>
    <!-- Location map -->
    <div class="tab-content" id="tab-location"></div>
</div>

<!-- ═══ HIDDEN FILE INPUT ═══ -->
<input type="file" id="hidden-file-input" accept="image/*" style="display:none" onchange="onHiddenFilePicked()">

<script>
(function() {
'use strict';

var OWNER = 'rideriko';
var REPO = 'grand-kamelia';
var BRANCH = 'main';
var DATA_PATH = 'docs/data.json';
var PHOTOS_DIR = 'docs/assets/photos/';
var ASSETS_DIR = 'docs/assets/';

var TOKEN_KEY = 'gc_admin_token';

/* ─── Token ─────────────────────────────────── */
function getToken() {
    try { return localStorage.getItem(TOKEN_KEY); } catch(e) { return null; }
}
function setToken(t) { try { localStorage.setItem(TOKEN_KEY, t); } catch(e) {} }
function clearToken() { try { localStorage.removeItem(TOKEN_KEY); } catch(e) {} }

/* ─── GitHub API ────────────────────────────── */
function ghURL(path) {
    return 'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + path + '?ref=' + BRANCH;
}

function ghHeaders() {
    return {
        'Authorization': 'token ' + getToken(),
        'Accept': 'application/vnd.github.v3+json'
    };
}

function ghGetJSON(path) {
    return fetch(ghURL(path), { headers: ghHeaders() })
        .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        });
}

function ghPut(path, contentBase64, sha) {
    var body = {
        message: 'admin: update ' + path,
        content: contentBase64,
        branch: BRANCH
    };
    if (sha) body.sha = sha;
    return fetch(ghURL(path), {
        method: 'PUT',
        headers: Object.assign(ghHeaders(), { 'Content-Type': 'application/json' }),
        body: JSON.stringify(body)
    }).then(function(r) {
        if (!r.ok) return r.json().then(function(e) { throw new Error('HTTP ' + r.status + ': ' + (e.message || path)); });
        return r.json();
    });
}

/* ─── UTF8-safe base64 ──────────────────────── */
function toBase64(str) {
    // encodeURIComponent → %XX, unescape → bytes, btoa → base64
    return btoa(unescape(encodeURIComponent(str)));
}
function fromBase64(b64) {
    return decodeURIComponent(escape(atob(b64)));
}

/* ─── State ─────────────────────────────────── */
var siteData = null;
var dataSha = null;
var currentTab = 'hero';
var pendingUploads = [];     // { path, base64 } files to upload on save
var photoLibrary = [];       // { path, download_url, name } — all known photos
var pendingDataURLs = {};    // temp data URLs for newly added files shown before save

/* ─── Login / Logout ────────────────────────── */
window.login = function() {
    var tok = document.getElementById('token-input').value.trim();
    var errEl = document.getElementById('login-error');
    if (!tok) { errEl.textContent = 'Введите токен'; errEl.style.display = 'block'; return; }
    errEl.style.display = 'none';
    setToken(tok);

    // Load data.json + photo library in parallel
    Promise.all([
        ghGetJSON(DATA_PATH),
        loadPhotoLibrary()
    ]).then(function(results) {
        var res = results[0];
        dataSha = res.sha;
        siteData = JSON.parse(fromBase64(res.content));
        showEditor();
    }).catch(function(e) {
        clearToken();
        errEl.textContent = 'Ошибка: ' + e.message + '. Проверьте токен.';
        errEl.style.display = 'block';
    });
};

window.logout = function() {
    clearToken();
    siteData = null;
    dataSha = null;
    pendingUploads = [];
    pendingDataURLs = {};
    photoLibrary = [];
    document.getElementById('editor-screen').classList.remove('show');
    document.getElementById('login-screen').style.display = '';
    document.getElementById('token-input').value = '';
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.getElementById('tab-hero').classList.add('active');
    currentTab = 'hero';
    document.querySelectorAll('.topbar .tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelector('.topbar .tab').classList.add('active');
};

/* ─── Photo library ─────────────────────────── */
function loadPhotoLibrary() {
    // Load both assets/photos/ and assets/ directories
    return Promise.all([
        ghGetJSON(PHOTOS_DIR).catch(function() { return []; }),
        ghGetJSON(ASSETS_DIR).catch(function() { return []; })
    ]).then(function(results) {
        var all = results[0].concat(results[1]);
        // dedupe by path, keep only image files
        var seen = {};
        photoLibrary = [];
        all.forEach(function(f) {
            if (seen[f.path]) return;
            seen[f.path] = true;
            var name = f.name.toLowerCase();
            if (/\.(svg|png|jpg|jpeg|gif|webp|ico)$/.test(name)) {
                photoLibrary.push({
                    path: f.path,
                    download_url: f.download_url,
                    name: f.name
                });
            }
        });
        // Sort: photos/ first, then alphabetically
        photoLibrary.sort(function(a, b) {
            var aPhoto = a.path.indexOf('photos/') !== -1;
            var bPhoto = b.path.indexOf('photos/') !== -1;
            if (aPhoto && !bPhoto) return 1;
            if (!aPhoto && bPhoto) return -1;
            return a.name.localeCompare(b.name);
        });
    });
}

function getImageUrl(dataPath) {
    if (!dataPath) return '';
    // Try both forms: "assets/..." (data.json) and "docs/assets/..." (GitHub API)
    var fullPath = 'docs/' + dataPath;
    // If it's a newly added file (data URL from FileReader)
    if (pendingDataURLs[fullPath]) return pendingDataURLs[fullPath];
    if (pendingDataURLs[dataPath]) return pendingDataURLs[dataPath];
    // Look up in photo library
    for (var i = 0; i < photoLibrary.length; i++) {
        if (photoLibrary[i].path === fullPath || photoLibrary[i].path === dataPath) {
            return photoLibrary[i].download_url;
        }
    }
    // Fallback: relative path from admin/
    return '../' + dataPath;
}

/* ─── Editor ────────────────────────────────── */
function showEditor() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('editor-screen').classList.add('show');
    renderTab(currentTab);
}

/* ─── Tab switching ─────────────────────────── */
window.switchTab = function(name) {
    currentTab = name;
    document.querySelectorAll('.topbar .tab').forEach(function(t) { t.classList.remove('active'); });
    var tabs = document.querySelectorAll('.topbar .tab');
    for (var i = 0; i < tabs.length; i++) {
        if (tabs[i].textContent.toLowerCase().indexOf(name) !== -1 ||
            (name === 'hero' && tabs[i].textContent === 'Слайдер') ||
            (name === 'infra' && tabs[i].textContent === 'Территория') ||
            (name === 'food' && tabs[i].textContent === 'Ресторан') ||
            (name === 'rooms' && tabs[i].textContent === 'Номера') ||
            (name === 'location' && tabs[i].textContent === 'Карта')) {
            tabs[i].classList.add('active');
        }
    }
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.getElementById('tab-' + name).classList.add('active');
    renderTab(name);
};

function renderTab(name) {
    var container = document.getElementById('tab-' + name);
    container.innerHTML =
        '<div class="tab-main" id="tab-main-' + name + '"></div>' +
        '<div class="tab-sidebar" id="tab-sidebar-' + name + '"></div>';

    switch (name) {
        case 'hero': renderHero(); break;
        case 'infra': renderInfra(); break;
        case 'food': renderFood(); break;
        case 'rooms': renderRooms(); break;
        case 'location': renderLocation(); break;
    }
    renderPhotoSidebar(name);
}

/* ─── Hero ──────────────────────────────────── */
function renderHero() {
    var slides = siteData.hero.slides;
    var html = '<div class="tab-header"><h2>Слайды героя (' + slides.length + ')</h2>' +
        '<button class="btn-add" onclick="addNewItem(\'hero\')">+ Добавить слайд</button></div>' +
        '<div class="card-list">';
    for (var i = 0; i < slides.length; i++) {
        html += arrayCard('hero', i, slides[i].src, [{ key: 'alt', label: 'Alt-описание', value: slides[i].alt || '' }], slides.length);
    }
    html += '</div>';
    document.getElementById('tab-main-hero').innerHTML = html;
}

/* ─── Infrastructure ────────────────────────── */
function renderInfra() {
    var items = siteData.infrastructure.gallery;
    var html = '<div class="tab-header"><h2>Галерея территории (' + items.length + ')</h2>' +
        '<button class="btn-add" onclick="addNewItem(\'infra\')">+ Добавить фото</button></div>' +
        '<div class="card-list">';
    for (var i = 0; i < items.length; i++) {
        html += arrayCard('infra', i, items[i].src, [{ key: 'caption', label: 'Подпись', value: items[i].caption || '' }], items.length);
    }
    html += '</div>';
    document.getElementById('tab-main-infra').innerHTML = html;
}

/* ─── Food ──────────────────────────────────── */
function renderFood() {
    var bg = siteData.food.background || '';
    var html = '<div class="tab-header"><h2>Фон ресторана</h2></div>' +
        '<div class="single-img">' +
        '<img class="thumb-big" src="' + getImageUrl(bg) + '" alt="" onerror="this.style.display=\'none\'" onload="this.style.display=\'\'">' +
        '<div class="src-row">' +
        '<input type="text" id="food-src" value="' + esc(bg) + '" placeholder="assets/food-restaurant.svg" onchange="siteData.food.background=this.value">' +
        '<button class="btn-pick" onclick="pickFromGallery(\'food-src\')">Галерея</button>' +
        '</div>' +
        '</div>';
    document.getElementById('tab-main-food').innerHTML = html;
}

/* ─── Rooms ─────────────────────────────────── */
function renderRooms() {
    var cards = siteData.rooms.cards;
    var html = '<div class="tab-header"><h2>Карточки номеров (' + cards.length + ')</h2>' +
        '<button class="btn-add" onclick="addNewItem(\'rooms\')">+ Добавить номер</button></div>' +
        '<div class="card-list">';
    for (var i = 0; i < cards.length; i++) {
        html += arrayCard('rooms', i, cards[i].src, [
            { key: 'title', label: 'Название', value: cards[i].title || '' },
            { key: 'badge', label: 'Бейдж (гости)', value: cards[i].badge || '' },
            { key: 'desc', label: 'Описание', value: cards[i].desc || '', textarea: true }
        ], cards.length);
    }
    html += '</div>';
    document.getElementById('tab-main-rooms').innerHTML = html;
}

/* ─── Location ──────────────────────────────── */
function renderLocation() {
    var map = siteData.location.map || '';
    var html = '<div class="tab-header"><h2>Карта</h2></div>' +
        '<div class="single-img">' +
        '<img class="thumb-big" src="' + getImageUrl(map) + '" alt="" onerror="this.style.display=\'none\'" onload="this.style.display=\'\'">' +
        '<div class="src-row">' +
        '<input type="text" id="location-src" value="' + esc(map) + '" placeholder="assets/location-map.svg" onchange="siteData.location.map=this.value">' +
        '<button class="btn-pick" onclick="pickFromGallery(\'location-src\')">Галерея</button>' +
        '</div>' +
        '</div>';
    document.getElementById('tab-main-location').innerHTML = html;
}

/* ─── Photo sidebar ─────────────────────────── */
function renderPhotoSidebar(section) {
    var sidebar = document.getElementById('tab-sidebar-' + section);
    if (!sidebar) return;
    var html = '<div class="photo-gallery-sidebar">' +
        '<h3>📷 Фото (' + photoLibrary.length + ')</h3>' +
        '<a class="gh-link" href="https://github.com/' + OWNER + '/' + REPO + '/tree/' + BRANCH + '/docs/assets/" target="_blank" rel="noopener">Открыть папку на GitHub →</a>';

    if (photoLibrary.length === 0) {
        html += '<p class="empty-msg">Нет загруженных фото.<br>Загрузите первое через кнопку ниже.</p>';
    } else {
        html += '<div class="photo-gallery-grid">';
        for (var i = 0; i < photoLibrary.length; i++) {
            var p = photoLibrary[i];
            var shortName = p.name.length > 20 ? p.name.substring(0, 18) + '…' : p.name;
            html += '<img class="gthumb" src="' + p.download_url + '" alt="' + esc(p.name) + '" title="' + esc(p.name) + '\n' + esc(p.path) + '" loading="lazy" decoding="async" width="80" height="60" onclick="onGalleryClick(\'' + esc(p.path) + '\', this)">';
        }
        html += '</div>';
    }

    html += '<button class="upload-btn" onclick="uploadNewPhoto()">📤 Загрузить новое фото</button>' +
        '<p class="upload-status" id="upload-status-' + section + '"></p>' +
        '</div>';
    sidebar.innerHTML = html;
}

/* ─── Gallery click handler ─────────────────── */
window.onGalleryClick = function(repoPath, el) {
    // Convert repo path (docs/assets/...) to data.json path (assets/...)
    var dataPath = repoPath;
    if (dataPath.indexOf('docs/') === 0) dataPath = dataPath.substring(5);

    // Highlight
    var prev = document.querySelector('.gthumb.selected');
    if (prev) prev.classList.remove('selected');
    if (el) el.classList.add('selected');

    copyToClipboard(dataPath);
    showToast('Скопирован: ' + dataPath);
};

window.pickFromGallery = function(inputId) {
    var input = document.getElementById(inputId);
    if (!input) return;
    showToast('Нажмите на фото в галерее справа, затем вставьте путь (Ctrl+V) в поле');
    input.focus();
};

window.uploadNewPhoto = function() {
    document.getElementById('hidden-file-input').click();
};

window.onHiddenFilePicked = function() {
    var file = document.getElementById('hidden-file-input').files[0];
    if (!file) return;
    var ext = file.name.split('.').pop().toLowerCase();
    var baseName = 'photo-' + Date.now() + '.' + ext;
    var destPath = PHOTOS_DIR + baseName;
    var displayPath = 'assets/photos/' + baseName;

    var reader = new FileReader();
    reader.onload = function(e) {
        var dataURL = e.target.result;
        var base64 = dataURL.split(',')[1];
        pendingUploads.push({ path: destPath, base64: base64, mime: file.type || 'image/' + ext });

        // Add to photo library immediately
        photoLibrary.unshift({
            path: destPath,
            download_url: dataURL,
            name: baseName
        });
        pendingDataURLs[destPath] = dataURL;

        // Refresh all tabs
        refreshAllTabs();
        showToast('Фото добавлено: ' + displayPath + ' (сохраните изменения)');
    };
    reader.readAsDataURL(file);
    // Reset input for re-upload of same file
    document.getElementById('hidden-file-input').value = '';
};

/* ─── Array card builder ─────────────────────── */
function arrayCard(section, index, src, fields, total) {
    var imgUrl = src ? getImageUrl(src) : '';
    var html = '<div class="img-card" data-section="' + section + '" data-index="' + index + '">' +
        '<span class="index-badge">' + (index + 1) + '</span>' +
        '<img class="thumb" src="' + imgUrl + '" alt="" loading="lazy" onerror="this.style.display=\'none\'" onload="this.style.display=\'\'">' +
        '<div class="fields">' +
        '<div class="src-row">' +
        '<input type="text" value="' + esc(src) + '" data-field="src" placeholder="assets/…" onchange="updateArrayField(\'' + section + '\',' + index + ',\'src\',this.value)">' +
        '<button class="btn-pick" onclick="pickFromGalleryForCard(\'' + section + '\',' + index + ')">Галерея</button>' +
        '</div>';

    for (var f = 0; f < fields.length; f++) {
        var field = fields[f];
        if (field.textarea) {
            html += '<textarea data-field="' + field.key + '" placeholder="' + field.label + '" rows="2" onchange="updateArrayField(\'' + section + '\',' + index + ',\'' + field.key + '\',this.value)">' + esc(field.value) + '</textarea>';
        } else {
            html += '<input type="text" value="' + esc(field.value) + '" data-field="' + field.key + '" placeholder="' + field.label + '" onchange="updateArrayField(\'' + section + '\',' + index + ',\'' + field.key + '\',this.value)">';
        }
    }

    html += '</div>' +
        '<div class="card-actions">' +
        '<button onclick="moveArrayItem(\'' + section + '\',' + index + ',-1)"' + (index === 0 ? ' disabled' : '') + ' title="Вверх">▲</button>' +
        '<button onclick="moveArrayItem(\'' + section + '\',' + index + ',1)"' + (index === total - 1 ? ' disabled' : '') + ' title="Вниз">▼</button>' +
        '<button class="del" onclick="deleteArrayItem(\'' + section + '\',' + index + ')" title="Удалить">✕</button>' +
        '</div>' +
        '</div>';
    return html;
}

window.pickFromGalleryForCard = function(section, index) {
    showToast('Нажмите на фото в галерее справа, затем вставьте путь (Ctrl+V) в поле src');
};

/* ─── Array operations ──────────────────────── */
function getArrayRef(section) {
    if (!siteData) return null;
    switch (section) {
        case 'hero': return siteData.hero.slides;
        case 'infra': return siteData.infrastructure.gallery;
        case 'rooms': return siteData.rooms.cards;
        default: return null;
    }
}

window.updateArrayField = function(section, index, field, value) {
    var arr = getArrayRef(section);
    if (!arr) return;
    arr[index][field] = value;
    // If src changed, update the thumbnail live
    if (field === 'src') {
        var card = document.querySelector('.img-card[data-section="' + section + '"][data-index="' + index + '"]');
        if (card) {
            var thumb = card.querySelector('.thumb');
            if (thumb) {
                var newUrl = getImageUrl(value);
                thumb.src = newUrl;
                if (newUrl) thumb.style.display = '';
                else thumb.style.display = 'none';
            }
        }
    }
};

window.moveArrayItem = function(section, index, dir) {
    var arr = getArrayRef(section);
    if (!arr) return;
    var newIdx = index + dir;
    if (newIdx < 0 || newIdx >= arr.length) return;
    var tmp = arr[index];
    arr[index] = arr[newIdx];
    arr[newIdx] = tmp;
    renderTab(section);
};

window.deleteArrayItem = function(section, index) {
    var arr = getArrayRef(section);
    if (!arr) return;
    arr.splice(index, 1);
    renderTab(section);
};

window.addNewItem = function(section) {
    var arr = getArrayRef(section);
    if (!arr) return;
    var emptySrc = 'assets/placeholder.svg';
    switch (section) {
        case 'hero':
            arr.push({ src: emptySrc, alt: '' });
            break;
        case 'infra':
            arr.push({ src: emptySrc, caption: '' });
            break;
        case 'rooms':
            arr.push({ src: emptySrc, title: 'Новый номер', badge: '', desc: '' });
            break;
    }
    renderTab(section);
    showToast('Новый элемент добавлен. Выберите фото в галерее или загрузите новое.');
};

/* ─── Refresh all ───────────────────────────── */
function refreshAllTabs() {
    ['hero','infra','food','rooms','location'].forEach(function(name) {
        var container = document.getElementById('tab-' + name);
        if (!container || !container.classList.contains('active')) return;
        renderTab(name);
    });
}

/* ─── Toast ─────────────────────────────────── */
var toastTimer;
function showToast(msg) {
    var el = document.getElementById('toast');
    if (!el) {
        el = document.createElement('div');
        el.id = 'toast';
        el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 24px;border-radius:20px;font-family:inherit;font-size:14px;z-index:999;transition:opacity 0.3s;pointer-events:none;';
        document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.opacity = '1';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.style.opacity = '0'; }, 3000);
}

function copyToClipboard(text) {
    try {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
    } catch(e) {}
}

/* ─── Save ──────────────────────────────────── */
window.saveAll = function() {
    var btnSave = document.getElementById('btn-save');
    var statusEl = document.getElementById('save-status');
    var spinner = document.getElementById('spinner');

    // Collect single-image field values
    var foodSrc = document.getElementById('food-src');
    if (foodSrc) siteData.food.background = foodSrc.value;
    var locationSrc = document.getElementById('location-src');
    if (locationSrc) siteData.location.map = locationSrc.value;

    btnSave.disabled = true;
    spinner.style.display = 'inline-block';
    statusEl.textContent = 'Сохранение…';
    statusEl.className = 'save-status';

    var jsonStr = JSON.stringify(siteData, null, 2);

    // Upload pending photos first
    var uploadPromises = pendingUploads.map(function(u) {
        return ghPut(u.path, u.base64, undefined).catch(function(e) {
            return ghGetJSON(u.path).then(function(existing) {
                return ghPut(u.path, u.base64, existing.sha);
            }).catch(function() { throw e; });
        });
    });

    function commitData(retry) {
        if (retry === undefined) retry = 0;
        // Always re-fetch the current SHA before saving — prevents 409
        return ghGetJSON(DATA_PATH).then(function(fresh) {
            return ghPut(DATA_PATH, toBase64(jsonStr), fresh.sha);
        }).then(function(res) {
            dataSha = res.content.sha;
            statusEl.textContent = '✓ Сохранено';
            statusEl.className = 'save-status success';
            refreshAllTabs();
        }).catch(function(err) {
            if (retry < 2 && err.message.indexOf('409') !== -1) {
                statusEl.textContent = 'Повторная попытка…';
                return commitData(retry + 1);
            }
            throw err;
        });
    }

    Promise.all(uploadPromises).then(function() {
        pendingUploads = [];
        pendingDataURLs = {};
        return loadPhotoLibrary();
    }).then(function() {
        return commitData();
    }).catch(function(err) {
        statusEl.textContent = '✕ ' + err.message;
        statusEl.className = 'save-status error';
    }).then(function() {
        btnSave.disabled = false;
        spinner.style.display = 'none';
        setTimeout(function() {
            if (statusEl.className.indexOf('success') !== -1) {
                statusEl.textContent = '';
                statusEl.className = 'save-status';
            }
        }, 5000);
    });
};

/* ─── Helpers ───────────────────────────────── */
function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ─── Init ──────────────────────────────────── */
if (getToken()) {
    Promise.all([
        ghGetJSON(DATA_PATH),
        loadPhotoLibrary()
    ]).then(function(results) {
        var res = results[0];
        dataSha = res.sha;
        siteData = JSON.parse(fromBase64(res.content));
        showEditor();
    }).catch(function() {
        clearToken();
    });
}

})();
