<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR — Помидорка в бургере</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f0eb;
            padding: 20px;
        }

        .poster {
            background: #fff;
            border-radius: 24px;
            padding: 40px 32px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.1);
            border: 3px dashed #e0d5c8;
        }

        .header-emoji {
            font-size: 56px;
            line-height: 1;
            margin-bottom: 4px;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            color: #2d1b0e;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 14px;
            color: #8b6f55;
            margin-bottom: 10px;
        }

        .qr-box {
            display: inline-block;
            background: #fff;
            border: 3px solid #2d1b0e;
            border-radius: 16px;
            padding: 8px;
            margin-bottom: 10px;
            line-height: 0;
        }

        .qr-box img {
            display: block;
            width: 220px;
            height: 220px;
        }

        .url {
            font-size: 14px;
            font-weight: 700;
            color: #4a3728;
            background: #f8f5f0;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .funny-line {
            font-size: 17px;
            font-weight: 700;
            color: #c62828;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .funny-line-2 {
            font-size: 13px;
            color: #8b6f55;
            font-style: italic;
        }

        .tomato-row {
            font-size: 28px;
            letter-spacing: 4px;
            margin-top: 10px;
        }

        /* Печать */
        @media print {
            body { background: #fff; padding: 0; }
            .poster {
                box-shadow: none;
                border: 2px dashed #ccc;
                border-radius: 0;
                max-width: 100%;
            }
            @page { margin: 10mm; }
        }
    </style>
</head>
<body>

<div class="poster">
    <div class="header-emoji">🍔❓🍅</div>
    <h1>Помидорный<br>вопрос!</h1>
    <p class="subtitle">Наведи камеру на QR-код</p>

    <div class="qr-box">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://gcamellia.ru/burger&color=2d1b0e" alt="QR-код голосования">
    </div>

    <p class="url">gcamellia.ru/burger</p>

    <p class="funny-line">
        Быть или не быть?<br>Решать тебе, а не шеф-повару!
    </p>
    <p class="funny-line-2">
        Каждый голос — спасённая (или изгнанная) помидорка 🍅
    </p>

    <div class="tomato-row">🍅🍔🍅🍔🍅</div>
</div>

</body>
</html>
