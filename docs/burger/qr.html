<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосование — Бургер · Grand Camellia</title>
    <link href="https://fonts.cdnfonts.com/css/circular-std" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Circular Std', 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7f7f7;
            padding: 20px;
        }

        .tent {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            border-radius: 14px;
            border: 1px solid #ebebeb;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }

        /* Сторона А — перевёрнутая */
        .side-a {
            padding: 28px 24px 20px;
            text-align: center;
            transform: rotate(180deg);
            border-bottom: 2px dashed #ebebeb;
        }

        /* Сторона Б — нормальная */
        .side-b {
            padding: 20px 24px 28px;
            text-align: center;
        }

        .illustration {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
        }

        .illustration .base {
            font-size: 40px;
            line-height: 1;
        }

        .illustration .ping {
            position: absolute;
            top: -4px;
            right: -12px;
            font-size: 18px;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1);   opacity: 1; }
            50%      { transform: scale(1.25); opacity: 0.55; }
        }

        .side-a h2,
        .side-b h2 {
            font-size: 18px;
            font-weight: 600;
            color: #222222;
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: -0.22px;
        }

        .qr-wrap {
            display: inline-block;
            border: 1px solid #ebebeb;
            border-radius: 14px;
            padding: 8px;
            line-height: 0;
            margin-bottom: 8px;
        }

        .qr-wrap img {
            display: block;
            width: 130px;
            height: 130px;
        }

        .tagline {
            font-size: 14px;
            font-weight: 400;
            color: #6a6a6a;
            line-height: 1.43;
        }

        .tagline-action {
            font-size: 14px;
            font-weight: 500;
            color: #222222;
            margin-top: 4px;
        }

        /* Печать */
        @media print {
            body { background: #ffffff; padding: 0; margin: 0; }
            .tent { box-shadow: none; border: none; border-radius: 0; max-width: 100%; }
            @page { margin: 0; size: A4 portrait; }
        }
    </style>
</head>
<body>

<div class="tent">
    <!-- Сторона А — перевёрнутая -->
    <div class="side-a">
        <div class="illustration">
            <span class="base">🍔</span>
            <span class="ping">🍅</span>
        </div>
        <h2>С помидоркой<br>или без?</h2>
        <div class="qr-wrap">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://gcamellia.ru/burger&color=222222&bgcolor=ffffff" alt="QR">
        </div>
        <p class="tagline">Помогите шефу решить<br>судьбу бургера</p>
        <p class="tagline-action">Наведите камеру</p>
    </div>

    <!-- Сторона Б — нормальная -->
    <div class="side-b">
        <div class="illustration">
            <span class="base">🍔</span>
            <span class="ping">🍅</span>
        </div>
        <h2>С помидоркой<br>или без?</h2>
        <div class="qr-wrap">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://gcamellia.ru/burger&color=222222&bgcolor=ffffff" alt="QR">
        </div>
        <p class="tagline">Помогите шефу решить<br>судьбу бургера</p>
        <p class="tagline-action">Наведите камеру</p>
    </div>
</div>

</body>
</html>
