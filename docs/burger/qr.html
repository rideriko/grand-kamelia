<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-домик — Помидорка в бургере · Grand Camellia</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e8e1d9;
            padding: 20px;
        }

        .tent {
            background: #fff;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.12);
        }

        /* Сторона А — перевёрнутая */
        .side-a {
            padding: 24px 20px 16px;
            text-align: center;
            transform: rotate(180deg);
            border-bottom: 2px dashed #d4c8bc;
        }

        /* Сторона Б — нормальная */
        .side-b {
            padding: 16px 20px 24px;
            text-align: center;
        }

        .side-a .emoji,
        .side-b .emoji {
            font-size: 32px;
            line-height: 1;
            margin-bottom: 4px;
            letter-spacing: 2px;
        }

        .side-a h2,
        .side-b h2 {
            font-size: 19px;
            font-weight: 700;
            color: #3d2b1a;
            line-height: 1.3;
            margin-bottom: 4px;
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        .side-a .qr-wrap,
        .side-b .qr-wrap {
            display: inline-block;
            border: 2.5px solid #3d2b1a;
            border-radius: 12px;
            padding: 6px;
            line-height: 0;
            margin-bottom: 4px;
        }

        .side-a .qr-wrap img,
        .side-b .qr-wrap img {
            display: block;
            width: 140px;
            height: 140px;
        }

        .side-a .url,
        .side-b .url {
            font-size: 12px;
            font-weight: 600;
            color: #6b5843;
            background: #faf7f2;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 14px;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .side-a .tagline,
        .side-b .tagline {
            font-size: 14px;
            font-weight: 600;
            color: #5a3e2b;
            line-height: 1.4;
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        .side-a .tagline2,
        .side-b .tagline2 {
            font-size: 11px;
            color: #9b8570;
            font-style: italic;
            margin-top: 2px;
        }

        /* Печать */
        @media print {
            body { background: #fff; padding: 0; margin: 0; }
            .tent { box-shadow: none; max-width: 100%; }
            @page { margin: 0; size: A4 portrait; }
        }
    </style>
</head>
<body>

<div class="tent">
    <!-- Сторона А — перевёрнутая, смотрит на соседа напротив -->
    <div class="side-a">
        <div class="emoji">🍅  🍔</div>
        <h2>А как вы<br>предпочитаете?</h2>
        <div class="qr-wrap">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://gcamellia.ru/burger&color=3d2b1a" alt="QR">
        </div>
        <p class="tagline">С помидоркой или без?</p>
        <p class="tagline2">Помогите нам стать лучше</p>
    </div>

    <!-- Сторона Б — нормальная, смотрит на сидящего рядом -->
    <div class="side-b">
        <div class="emoji">🍔  🍅</div>
        <h2>Помогите шефу<br>с выбором</h2>
        <div class="qr-wrap">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://gcamellia.ru/burger&color=3d2b1a" alt="QR">
        </div>
        <p class="tagline">С помидоркой или без?</p>
        <p class="tagline2">Голосование займёт пару секунд</p>
    </div>
</div>

</body>
</html>
