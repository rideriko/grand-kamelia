<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опрос — Помидорка в бургере</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #f9373f 0%, #f9373f 30%, #f9a03f 70%, #f9a03f 100%);
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 28px;
            padding: 44px 28px 36px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: popIn 0.35s ease-out;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .emoji {
            font-size: 64px;
            line-height: 1;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            color: #2d1b0e;
            line-height: 1.25;
            margin-bottom: 8px;
        }

        .sub {
            font-size: 15px;
            color: #8b6f55;
            margin-bottom: 32px;
        }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            max-width: 140px;
            padding: 18px 0;
            font-size: 22px;
            font-weight: 800;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-yes {
            background: #4caf50;
            box-shadow: 0 6px 20px rgba(76,175,80,0.4);
        }
        .btn-yes:hover { background: #43a047; }

        .btn-no {
            background: #ef5350;
            box-shadow: 0 6px 20px rgba(239,83,80,0.4);
        }
        .btn-no:hover { background: #e53935; }

        /* Результаты */
        .results { display: none; }

        .results.show { display: block; }

        .ty-msg {
            font-size: 18px;
            font-weight: 700;
            color: #2d1b0e;
            margin-bottom: 6px;
        }

        .my-vote {
            font-size: 14px;
            color: #8b6f55;
            margin-bottom: 18px;
        }

        .my-vote strong {
            color: #2d1b0e;
        }

        .bar-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a3728;
        }

        .bar-track {
            height: 28px;
            background: #f0e8e0;
            border-radius: 14px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 14px;
            transition: width 0.6s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            min-width: 0;
        }

        .bar-fill.yes { background: #4caf50; }
        .bar-fill.no  { background: #ef5350; }

        .total-votes {
            margin-top: 8px;
            font-size: 13px;
            color: #a08870;
        }

        .btn-change {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            color: #5a4a3a;
            background: #f5f0eb;
            border: 1.5px solid #d4c8bc;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-change:hover {
            background: #ebe3d9;
        }

        .btn-change:active {
            background: #ddd4c8;
            transform: scale(0.97);
        }

        .btn-reset {
            display: none;
            margin-top: 12px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            color: #c62828;
            background: #fff;
            border: 1.5px solid #ef9a9a;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-reset.show { display: inline-block; }

        .btn-reset:hover { background: #ffebee; }

        .btn-reset:active {
            background: #ffcdd2;
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<div class="card" id="card">
    <!-- Экран голосования -->
    <div id="vote-screen">
        <div class="emoji">🍔</div>
        <h1>Нужна ли помидорка<br>в бургере?</h1>
        <p class="sub" id="vote-sub">Голосуйте! Нам важно ваше мнение</p>
        <div class="buttons">
            <button class="btn btn-yes" onclick="vote('yes')">ДА</button>
            <button class="btn btn-no"  onclick="vote('no')">НЕТ</button>
        </div>
        <button class="btn-reset" id="btn-reset-vote" onclick="resetAll()">🗑️ Сбросить всё голосование</button>
    </div>

    <!-- Экран результатов -->
    <div id="results-screen" class="results">
        <div class="emoji">🍅</div>
        <p class="ty-msg">Спасибо за ваш голос!</p>
        <p class="my-vote">Ваш выбор: <strong id="my-choice">—</strong></p>
        <div class="bar-group">
            <div class="bar-label"><span>Да, помидорка нужна</span><span id="pct-yes">0%</span></div>
            <div class="bar-track"><div class="bar-fill yes" id="bar-yes" style="width:0%"></div></div>
        </div>
        <div class="bar-group">
            <div class="bar-label"><span>Нет, без помидорки</span><span id="pct-no">0%</span></div>
            <div class="bar-track"><div class="bar-fill no" id="bar-no" style="width:0%"></div></div>
        </div>
        <p class="total-votes">Всего голосов: <strong id="total">0</strong></p>
        <button class="btn-change" onclick="changeVote()">🔄 Изменить решение</button>
        <br>
        <button class="btn-reset" id="btn-reset-results" onclick="resetAll()">🗑️ Сбросить всё голосование</button>
    </div>
</div>

<script>
(function() {
'use strict';

var CHOICE_KEY = 'burger_choice'; // 'yes' или 'no'

// ---- helpers ----

function fetchJSON(url) {
    return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url);
        xhr.timeout = 6000;
        xhr.onload = function() {
            if (xhr.status >= 200 && xhr.status < 300) {
                try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(e); }
            } else {
                reject(new Error('HTTP ' + xhr.status));
            }
        };
        xhr.onerror = function() { reject(new Error('network')); };
        xhr.ontimeout = function() { reject(new Error('timeout')); };
        xhr.send();
    });
}

var API = 'https://countapi.mileshilliard.com/api/v1';

function getCounts() {
    return Promise.all([
        fetchJSON(API + '/get/gcamellia-burger-yes').then(function(r) { return r.value || 0; }).catch(function() { return 0; }),
        fetchJSON(API + '/get/gcamellia-burger-no').then(function(r) { return r.value || 0; }).catch(function() { return 0; })
    ]).then(function(arr) {
        return { yes: arr[0], no: arr[1] };
    });
}

function hitYes() { return fetchJSON(API + '/hit/gcamellia-burger-yes'); }
function hitNo()  { return fetchJSON(API + '/hit/gcamellia-burger-no');  }

function getMyChoice() {
    try { return localStorage.getItem(CHOICE_KEY); } catch(e) { return null; }
}
function setMyChoice(choice) {
    try { localStorage.setItem(CHOICE_KEY, choice); } catch(e) {}
}
function clearMyChoice() {
    try { localStorage.removeItem(CHOICE_KEY); } catch(e) {}
}

// ---- screens ----

var $vote    = document.getElementById('vote-screen');
var $results = document.getElementById('results-screen');
var $voteSub = document.getElementById('vote-sub');
var $myChoice= document.getElementById('my-choice');
var $pctYes  = document.getElementById('pct-yes');
var $pctNo   = document.getElementById('pct-no');
var $barYes  = document.getElementById('bar-yes');
var $barNo   = document.getElementById('bar-no');
var $total   = document.getElementById('total');

var voting = false;

var LABELS = { yes: 'ДА 👍', no: 'НЕТ 👎' };
var EMOJI  = { yes: '🍅',  no: '🍔' };

function showVoteScreen(changing) {
    $vote.style.display = '';
    $results.classList.remove('show');
    if (changing) {
        $voteSub.textContent = 'Ваш выбор: ' + LABELS[getMyChoice()] + ' — измените на:';
    } else {
        $voteSub.textContent = 'Голосуйте! Нам важно ваше мнение';
    }
}

function showResults(yes, no) {
    $vote.style.display = 'none';
    $results.classList.add('show');

    var choice = getMyChoice();
    $myChoice.textContent = choice ? LABELS[choice] : '—';

    var total = yes + no;
    if (total === 0) {
        $pctYes.textContent = '0%';
        $pctNo.textContent  = '0%';
        $barYes.style.width = '0%';
        $barNo.style.width  = '0%';
        $total.textContent  = '0';
        return;
    }

    var pctYes = Math.round((yes / total) * 100);
    var pctNo  = 100 - pctYes;

    $pctYes.textContent = pctYes + '%';
    $pctNo.textContent  = pctNo  + '%';
    $barYes.style.width = pctYes + '%';
    $barNo.style.width  = pctNo  + '%';
    $total.textContent  = String(total);
}

// ---- vote ----

window.vote = function(choice) {
    if (voting) return;

    var prev = getMyChoice();

    // Если уже голосовал и выбрал то же самое — просто показываем результаты
    if (prev && prev === choice) {
        getCounts().then(function(c) { showResults(c.yes, c.no); });
        return;
    }

    voting = true;
    var btn = choice === 'yes'
        ? document.querySelector('.btn-yes')
        : document.querySelector('.btn-no');
    var origText = btn.textContent;
    btn.textContent = '…';
    btn.disabled = true;

    var hit = choice === 'yes' ? hitYes : hitNo;

    hit().then(function() {
        setMyChoice(choice);
        if (navigator.vibrate) navigator.vibrate(30);
        return getCounts();
    }).then(function(c) {
        showResults(c.yes, c.no);
    }).catch(function() {
        setMyChoice(choice);
        getCounts().then(function(c) { showResults(c.yes, c.no); });
    }).then(function() {
        voting = false;
        btn.textContent = origText;
        btn.disabled = false;
    });
};

// ---- change vote ----

window.changeVote = function() {
    showVoteScreen(true);
};

// ---- reset ----

function setCounter(key, value) {
    return fetchJSON(API + '/set/' + key + '?value=' + value);
}

var resetting = false;

window.resetAll = function() {
    if (resetting) return;
    if (!confirm('Точно сбросить ВСЁ голосование? Это обнулит общий счётчик для всех.')) return;

    resetting = true;
    Promise.all([
        setCounter('gcamellia-burger-yes', 0),
        setCounter('gcamellia-burger-no', 0)
    ]).then(function() {
        clearMyChoice();
        showVoteScreen(false);
        $voteSub.textContent = 'Голосование сброшено! Голосуйте заново';
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }).catch(function() {
        alert('Ошибка сброса. Попробуйте ещё раз.');
    }).then(function() {
        resetting = false;
    });
};

// ---- triple-tap reset ----

var taps = [];
document.addEventListener('click', function(e) {
    if (!e.target.closest('.emoji')) return;
    var now = Date.now();
    taps.push(now);
    taps = taps.filter(function(t) { return now - t < 1500; });
    if (taps.length >= 5) {
        taps = [];
        resetAll();
    }
});

// ---- admin mode: ?reset в адресной строке ----

function hasParam(name) {
    return window.location.search.indexOf(name) !== -1;
}

if (hasParam('reset')) {
    document.getElementById('btn-reset-vote').classList.add('show');
    document.getElementById('btn-reset-results').classList.add('show');
}

// ---- init ----

getCounts(); // подгружаем фоном

// Если уже голосовал — показываем результаты
if (getMyChoice()) {
    getCounts().then(function(c) { showResults(c.yes, c.no); });
}

})();
</script>

</body>
</html>
