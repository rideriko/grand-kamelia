<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бургер — с помидоркой или без? · Grand Camellia</title>
    <link href="https://fonts.cdnfonts.com/css/circular-std" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Circular Std', 'Circular', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border-radius: 14px;
            padding: 48px 32px 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #ebebeb;
            animation: fadeUp 0.35s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .illustration {
            margin-bottom: 24px;
            position: relative;
            display: inline-block;
        }

        .illustration .base {
            font-size: 72px;
            line-height: 1;
        }

        .illustration .ping {
            position: absolute;
            top: -6px;
            right: -18px;
            font-size: 26px;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1);   opacity: 1; }
            50%      { transform: scale(1.25); opacity: 0.55; }
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #222222;
            line-height: 1.18;
            letter-spacing: -0.44px;
            margin-bottom: 6px;
        }

        .sub {
            font-size: 16px;
            font-weight: 400;
            color: #6a6a6a;
            line-height: 1.43;
            margin-bottom: 32px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            max-width: 156px;
            padding: 14px 0;
            font-family: inherit;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 32px;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s;
            color: #ffffff;
            background: #ff385c;
            letter-spacing: 0;
        }

        .btn:hover  { background: #e00b41; }
        .btn:active { background: #d50032; transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: default; }

        .btn-outline {
            background: #ffffff;
            color: #222222;
            border: 1.5px solid #c1c1c1;
        }
        .btn-outline:hover  { background: #f7f7f7; border-color: #222222; }
        .btn-outline:active { background: #ebebeb; transform: scale(0.97); }

        /* Результаты */
        .results { display: none; }
        .results.show { display: block; }

        .ty-msg {
            font-size: 16px;
            font-weight: 500;
            color: #222222;
            margin-bottom: 6px;
        }

        .my-vote {
            font-size: 14px;
            color: #6a6a6a;
            margin-bottom: 28px;
        }

        .my-vote strong {
            color: #222222;
            font-weight: 500;
        }

        .bar-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 8px;
            color: #222222;
        }

        .bar-track {
            height: 8px;
            background: #f7f7f7;
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-width: 0;
        }

        .bar-fill.yes { background: #ff385c; }
        .bar-fill.no  { background: #222222; }

        .total-votes {
            margin-top: 12px;
            font-size: 13px;
            color: #6a6a6a;
            font-weight: 400;
        }

        .btn-change {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            color: #222222;
            background: #ffffff;
            border: 1.5px solid #dddddd;
            border-radius: 32px;
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s;
        }

        .btn-change:hover {
            background: #f7f7f7;
            border-color: #222222;
        }

        .btn-change:active {
            background: #ebebeb;
            transform: scale(0.97);
        }

        .btn-reset {
            display: none;
            margin-top: 16px;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            color: #6a6a6a;
            background: #ffffff;
            border: 1px solid #ebebeb;
            border-radius: 32px;
            cursor: pointer;
            transition: color 0.12s, border-color 0.12s;
        }

        .btn-reset.show { display: inline-block; }
        .btn-reset:hover { color: #c13515; border-color: #c13515; }
        .btn-reset:active { background: #f7f7f7; transform: scale(0.97); }

        /* Адаптив */
        @media (max-width: 360px) {
            .card { padding: 36px 20px 32px; }
            h1 { font-size: 20px; }
            .btn { padding: 12px 0; font-size: 15px; }
            .buttons { gap: 10px; }
        }
    </style>
</head>
<body>

<div class="card" id="card">
    <!-- Экран голосования -->
    <div id="vote-screen">
        <div class="illustration">
            <span class="base">🍔</span>
            <span class="ping">🍅</span>
        </div>
        <h1>С помидоркой или без?</h1>
        <p class="sub" id="vote-sub">Помогите шефу решить судьбу бургера</p>
        <div class="buttons">
            <button class="btn" onclick="vote('yes')">С помидоркой</button>
            <button class="btn btn-outline" onclick="vote('no')">Без помидорки</button>
        </div>
        <button class="btn-reset" id="btn-reset-vote" onclick="resetAll()">Сбросить голосование</button>
    </div>

    <!-- Экран результатов -->
    <div id="results-screen" class="results">
        <div class="illustration">
            <span class="base">🍔</span>
            <span class="ping">🍅</span>
        </div>
        <p class="ty-msg">Спасибо за ваш голос!</p>
        <p class="my-vote">Вы предпочитаете: <strong id="my-choice">—</strong></p>
        <div class="bar-group">
            <div class="bar-label"><span>С помидоркой</span><span id="pct-yes">0%</span></div>
            <div class="bar-track"><div class="bar-fill yes" id="bar-yes" style="width:0%"></div></div>
        </div>
        <div class="bar-group">
            <div class="bar-label"><span>Без помидорки</span><span id="pct-no">0%</span></div>
            <div class="bar-track"><div class="bar-fill no" id="bar-no" style="width:0%"></div></div>
        </div>
        <p class="total-votes">Всего голосов: <strong id="total">0</strong></p>
        <button class="btn-change" onclick="changeVote()">Изменить решение</button>
        <br>
        <button class="btn-reset" id="btn-reset-results" onclick="resetAll()">Сбросить голосование</button>
    </div>
</div>

<script>
(function() {
'use strict';

var CHOICE_KEY = 'burger_choice';

function fetchJSON(url) {
    return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url);
        xhr.timeout = 6000;
        xhr.onload = function() {
            if (xhr.status >= 200 && xhr.status < 300) {
                try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(e); }
            } else { reject(new Error('HTTP ' + xhr.status)); }
        };
        xhr.onerror = function() { reject(new Error('network')); };
        xhr.ontimeout = function() { reject(new Error('timeout')); };
        xhr.send();
    });
}

var API = 'https://countapi.mileshilliard.com/api/v1';

function getCounts() {
    return Promise.all([
        fetchJSON(API + '/get/gcamellia-burger-yes').then(function(r) { return r.value || 0; }).catch(function() { return 0; }),
        fetchJSON(API + '/get/gcamellia-burger-no').then(function(r) { return r.value || 0; }).catch(function() { return 0; })
    ]).then(function(arr) { return { yes: arr[0], no: arr[1] }; });
}

function hitYes() { return fetchJSON(API + '/hit/gcamellia-burger-yes'); }
function hitNo()  { return fetchJSON(API + '/hit/gcamellia-burger-no');  }

function getMyChoice() {
    try { return localStorage.getItem(CHOICE_KEY); } catch(e) { return null; }
}
function setMyChoice(choice) {
    try { localStorage.setItem(CHOICE_KEY, choice); } catch(e) {}
}
function clearMyChoice() {
    try { localStorage.removeItem(CHOICE_KEY); } catch(e) {}
}

var $vote    = document.getElementById('vote-screen');
var $results = document.getElementById('results-screen');
var $voteSub = document.getElementById('vote-sub');
var $myChoice= document.getElementById('my-choice');
var $pctYes  = document.getElementById('pct-yes');
var $pctNo   = document.getElementById('pct-no');
var $barYes  = document.getElementById('bar-yes');
var $barNo   = document.getElementById('bar-no');
var $total   = document.getElementById('total');

var voting = false;

var LABELS = { yes: 'с помидоркой', no: 'без помидорки' };

function showVoteScreen(changing) {
    $vote.style.display = '';
    $results.classList.remove('show');
    if (changing) {
        $voteSub.textContent = 'Вы выбрали «' + LABELS[getMyChoice()] + '». Измените решение:';
    } else {
        $voteSub.textContent = 'Помогите шефу решить судьбу бургера';
    }
}

function showResults(yes, no) {
    $vote.style.display = 'none';
    $results.classList.add('show');

    var choice = getMyChoice();
    $myChoice.textContent = choice ? '«' + LABELS[choice] + '»' : '—';

    var total = yes + no;
    if (total === 0) {
        $pctYes.textContent = '0%';
        $pctNo.textContent  = '0%';
        $barYes.style.width = '0%';
        $barNo.style.width  = '0%';
        $total.textContent  = '0';
        return;
    }

    var pctYes = Math.round((yes / total) * 100);
    var pctNo  = 100 - pctYes;

    $pctYes.textContent = pctYes + '%';
    $pctNo.textContent  = pctNo  + '%';
    $barYes.style.width = pctYes + '%';
    $barNo.style.width  = pctNo  + '%';
    $total.textContent  = String(total);
}

window.vote = function(choice) {
    if (voting) return;
    var prev = getMyChoice();
    if (prev && prev === choice) {
        getCounts().then(function(c) { showResults(c.yes, c.no); });
        return;
    }
    voting = true;
    var btn = choice === 'yes'
        ? document.querySelector('.btn')
        : document.querySelector('.btn-outline');
    var origText = btn.textContent;
    btn.textContent = '…';
    btn.disabled = true;

    var hit = choice === 'yes' ? hitYes : hitNo;
    hit().then(function() {
        setMyChoice(choice);
        if (navigator.vibrate) navigator.vibrate(30);
        return getCounts();
    }).then(function(c) {
        showResults(c.yes, c.no);
    }).catch(function() {
        setMyChoice(choice);
        getCounts().then(function(c) { showResults(c.yes, c.no); });
    }).then(function() {
        voting = false;
        btn.textContent = origText;
        btn.disabled = false;
    });
};

window.changeVote = function() {
    showVoteScreen(true);
};

// ---- reset ----

function setCounter(key, value) {
    return fetchJSON(API + '/set/' + key + '?value=' + value);
}

var resetting = false;

window.resetAll = function() {
    if (resetting) return;
    if (!confirm('Сбросить всё голосование? Это обнулит общий счётчик.')) return;
    resetting = true;
    Promise.all([
        setCounter('gcamellia-burger-yes', 0),
        setCounter('gcamellia-burger-no', 0)
    ]).then(function() {
        clearMyChoice();
        showVoteScreen(false);
        $voteSub.textContent = 'Голосование сброшено. Голосуйте заново!';
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }).catch(function() {
        alert('Ошибка сброса. Попробуйте ещё раз.');
    }).then(function() {
        resetting = false;
    });
};

// ---- triple-tap reset ----

var taps = [];
document.addEventListener('click', function(e) {
    if (!e.target.closest('.illustration')) return;
    var now = Date.now();
    taps.push(now);
    taps = taps.filter(function(t) { return now - t < 1500; });
    if (taps.length >= 5) { taps = []; resetAll(); }
});

// ---- admin mode ----

if (window.location.search.indexOf('reset') !== -1) {
    document.getElementById('btn-reset-vote').classList.add('show');
    document.getElementById('btn-reset-results').classList.add('show');
}

// ---- init ----

getCounts();
if (getMyChoice()) {
    getCounts().then(function(c) { showResults(c.yes, c.no); });
}

})();
</script>

</body>
</html>
