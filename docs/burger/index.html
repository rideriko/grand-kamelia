<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опрос — Помидорка в бургере</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #f9373f 0%, #f9373f 30%, #f9a03f 70%, #f9a03f 100%);
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 28px;
            padding: 44px 28px 36px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: popIn 0.35s ease-out;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .emoji {
            font-size: 64px;
            line-height: 1;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            color: #2d1b0e;
            line-height: 1.25;
            margin-bottom: 8px;
        }

        .sub {
            font-size: 15px;
            color: #8b6f55;
            margin-bottom: 32px;
        }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            max-width: 140px;
            padding: 18px 0;
            font-size: 22px;
            font-weight: 800;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-yes {
            background: #4caf50;
            box-shadow: 0 6px 20px rgba(76,175,80,0.4);
        }
        .btn-yes:hover { background: #43a047; }

        .btn-no {
            background: #ef5350;
            box-shadow: 0 6px 20px rgba(239,83,80,0.4);
        }
        .btn-no:hover { background: #e53935; }

        /* Результаты */
        .results { display: none; }

        .results.show { display: block; }

        .ty-msg {
            font-size: 18px;
            font-weight: 700;
            color: #2d1b0e;
            margin-bottom: 24px;
        }

        .bar-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a3728;
        }

        .bar-track {
            height: 28px;
            background: #f0e8e0;
            border-radius: 14px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 14px;
            transition: width 0.6s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            min-width: 0;
        }

        .bar-fill.yes { background: #4caf50; }
        .bar-fill.no  { background: #ef5350; }

        .total-votes {
            margin-top: 8px;
            font-size: 13px;
            color: #a08870;
        }
    </style>
</head>
<body>

<div class="card" id="card">
    <!-- Экран голосования -->
    <div id="vote-screen">
        <div class="emoji">🍔</div>
        <h1>Нужна ли помидорка<br>в бургере?</h1>
        <p class="sub">Голосуйте! Нам важно ваше мнение</p>
        <div class="buttons">
            <button class="btn btn-yes" onclick="vote('yes')">ДА</button>
            <button class="btn btn-no"  onclick="vote('no')">НЕТ</button>
        </div>
    </div>

    <!-- Экран результатов -->
    <div id="results-screen" class="results">
        <div class="emoji">🍅</div>
        <p class="ty-msg">Спасибо за ваш голос!</p>
        <div class="bar-group">
            <div class="bar-label"><span>Да, помидорка нужна</span><span id="pct-yes">0%</span></div>
            <div class="bar-track"><div class="bar-fill yes" id="bar-yes" style="width:0%"></div></div>
        </div>
        <div class="bar-group">
            <div class="bar-label"><span>Нет, без помидорки</span><span id="pct-no">0%</span></div>
            <div class="bar-track"><div class="bar-fill no" id="bar-no" style="width:0%"></div></div>
        </div>
        <p class="total-votes">Всего голосов: <strong id="total">0</strong></p>
    </div>
</div>

<script>
const STORAGE_KEY = 'burger_tomato_poll_voted';
const API = 'https://api.countapi.xyz';

async function fetchCounts() {
    const [yesRes, noRes] = await Promise.all([
        fetch(API + '/get/gcamellia/burger-yes').then(r => r.json()).catch(() => ({ value: 0 })),
        fetch(API + '/get/gcamellia/burger-no').then(r => r.json()).catch(() => ({ value: 0 }))
    ]);
    return { yes: yesRes.value || 0, no: noRes.value || 0 };
}

async function voteYes() { await fetch(API + '/hit/gcamellia/burger-yes'); }
async function voteNo()  { await fetch(API + '/hit/gcamellia/burger-no');  }

function hasVoted() {
    try { return localStorage.getItem(STORAGE_KEY) === '1'; } catch { return false; }
}

function markVoted() {
    try { localStorage.setItem(STORAGE_KEY, '1'); } catch {}
}

function showResults(yes, no) {
    const total = yes + no;

    document.getElementById('vote-screen').style.display = 'none';
    document.getElementById('results-screen').classList.add('show');

    if (total === 0) return;

    const pctYes = Math.round((yes / total) * 100);
    const pctNo  = 100 - pctYes;

    document.getElementById('pct-yes').textContent = pctYes + '%';
    document.getElementById('pct-no').textContent  = pctNo  + '%';
    document.getElementById('bar-yes').style.width = pctYes + '%';
    document.getElementById('bar-no').style.width  = pctNo  + '%';
    document.getElementById('total').textContent = total;
}

async function vote(choice) {
    if (hasVoted()) {
        const c = await fetchCounts();
        showResults(c.yes, c.no);
        return;
    }

    // Отправляем голос в общий счётчик
    if (choice === 'yes') await voteYes();
    else await voteNo();

    markVoted();

    if (navigator.vibrate) navigator.vibrate(30);

    const c = await fetchCounts();
    showResults(c.yes, c.no);
}

// Сброс: 3 быстрых тапа по 🍅
let tapTimes = [];
document.getElementById('results-screen').addEventListener('click', function(e) {
    if (!e.target.closest('.emoji')) return;
    const now = Date.now();
    tapTimes.push(now);
    tapTimes = tapTimes.filter(t => now - t < 1500);
    if (tapTimes.length >= 3) {
        tapTimes = [];
        localStorage.removeItem(STORAGE_KEY);
        document.getElementById('vote-screen').style.display = '';
        document.getElementById('results-screen').classList.remove('show');
        if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
    }
});

// Загрузка: если голосовал — показать результаты, иначе — экран голосования
(async function init() {
    if (hasVoted()) {
        const c = await fetchCounts();
        showResults(c.yes, c.no);
    } else {
        // Подгружаем текущие результаты в фон (пригодятся после голоса)
        fetchCounts();
    }
})();
</script>

</body>
</html>
