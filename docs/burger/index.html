<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опрос — Помидорка в бургере</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #f9373f 0%, #f9373f 30%, #f9a03f 70%, #f9a03f 100%);
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 28px;
            padding: 44px 28px 36px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: popIn 0.35s ease-out;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .emoji {
            font-size: 64px;
            line-height: 1;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            color: #2d1b0e;
            line-height: 1.25;
            margin-bottom: 8px;
        }

        .sub {
            font-size: 15px;
            color: #8b6f55;
            margin-bottom: 32px;
        }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            max-width: 140px;
            padding: 18px 0;
            font-size: 22px;
            font-weight: 800;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-yes {
            background: #4caf50;
            box-shadow: 0 6px 20px rgba(76,175,80,0.4);
        }
        .btn-yes:hover { background: #43a047; }

        .btn-no {
            background: #ef5350;
            box-shadow: 0 6px 20px rgba(239,83,80,0.4);
        }
        .btn-no:hover { background: #e53935; }

        /* Результаты */
        .results { display: none; }

        .results.show { display: block; }

        .ty-msg {
            font-size: 18px;
            font-weight: 700;
            color: #2d1b0e;
            margin-bottom: 24px;
        }

        .bar-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a3728;
        }

        .bar-track {
            height: 28px;
            background: #f0e8e0;
            border-radius: 14px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 14px;
            transition: width 0.6s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            min-width: 0;
        }

        .bar-fill.yes { background: #4caf50; }
        .bar-fill.no  { background: #ef5350; }

        .total-votes {
            margin-top: 8px;
            font-size: 13px;
            color: #a08870;
        }
    </style>
</head>
<body>

<div class="card" id="card">
    <!-- Экран голосования -->
    <div id="vote-screen">
        <div class="emoji">🍔</div>
        <h1>Нужна ли помидорка<br>в бургере?</h1>
        <p class="sub">Голосуйте! Нам важно ваше мнение</p>
        <div class="buttons">
            <button class="btn btn-yes" onclick="vote('yes')">ДА</button>
            <button class="btn btn-no"  onclick="vote('no')">НЕТ</button>
        </div>
    </div>

    <!-- Экран результатов -->
    <div id="results-screen" class="results">
        <div class="emoji">🍅</div>
        <p class="ty-msg">Спасибо за ваш голос!</p>
        <div class="bar-group">
            <div class="bar-label"><span>Да, помидорка нужна</span><span id="pct-yes">0%</span></div>
            <div class="bar-track"><div class="bar-fill yes" id="bar-yes" style="width:0%"></div></div>
        </div>
        <div class="bar-group">
            <div class="bar-label"><span>Нет, без помидорки</span><span id="pct-no">0%</span></div>
            <div class="bar-track"><div class="bar-fill no" id="bar-no" style="width:0%"></div></div>
        </div>
        <p class="total-votes">Всего голосов: <strong id="total">0</strong></p>
    </div>
</div>

<script>
(function() {
'use strict';

var KEY = 'burger_voted';

// ---- helpers ----

function fetchJSON(url) {
    return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url);
        xhr.timeout = 6000;
        xhr.onload = function() {
            if (xhr.status >= 200 && xhr.status < 300) {
                try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(e); }
            } else {
                reject(new Error('HTTP ' + xhr.status));
            }
        };
        xhr.onerror = function() { reject(new Error('network')); };
        xhr.ontimeout = function() { reject(new Error('timeout')); };
        xhr.send();
    });
}

var API = 'https://api.countapi.xyz';

function getCounts() {
    return Promise.all([
        fetchJSON(API + '/get/gcamellia/burger-yes').then(function(r) { return r.value || 0; }).catch(function() { return 0; }),
        fetchJSON(API + '/get/gcamellia/burger-no').then(function(r) { return r.value || 0; }).catch(function() { return 0; })
    ]).then(function(arr) {
        return { yes: arr[0], no: arr[1] };
    });
}

function hitYes() { return fetchJSON(API + '/hit/gcamellia/burger-yes'); }
function hitNo()  { return fetchJSON(API + '/hit/gcamellia/burger-no');  }

function voted() {
    try { return localStorage.getItem(KEY) === '1'; } catch(e) { return false; }
}
function setVoted() {
    try { localStorage.setItem(KEY, '1'); } catch(e) {}
}
function clearVoted() {
    try { localStorage.removeItem(KEY); } catch(e) {}
}

// ---- screens ----

var $vote    = document.getElementById('vote-screen');
var $results = document.getElementById('results-screen');
var $pctYes  = document.getElementById('pct-yes');
var $pctNo   = document.getElementById('pct-no');
var $barYes  = document.getElementById('bar-yes');
var $barNo   = document.getElementById('bar-no');
var $total   = document.getElementById('total');

var voting = false;

function showVoteScreen() {
    $vote.style.display = '';
    $results.classList.remove('show');
}

function showResults(yes, no) {
    $vote.style.display = 'none';
    $results.classList.add('show');

    var total = yes + no;
    if (total === 0) return;

    var pctYes = Math.round((yes / total) * 100);
    var pctNo  = 100 - pctYes;

    $pctYes.textContent = pctYes + '%';
    $pctNo.textContent  = pctNo  + '%';
    $barYes.style.width = pctYes + '%';
    $barNo.style.width  = pctNo  + '%';
    $total.textContent  = String(total);
}

// ---- vote ----

window.vote = function(choice) {
    if (voting) return;           // не спамим
    if (voted()) {                // уже голосовал — просто показываем
        getCounts().then(function(c) { showResults(c.yes, c.no); });
        return;
    }

    voting = true;
    var btn = choice === 'yes'
        ? document.querySelector('.btn-yes')
        : document.querySelector('.btn-no');
    var origText = btn.textContent;
    btn.textContent = '…';
    btn.disabled = true;

    var hit = choice === 'yes' ? hitYes : hitNo;

    hit().then(function() {
        setVoted();
        if (navigator.vibrate) navigator.vibrate(30);
        return getCounts();
    }).then(function(c) {
        showResults(c.yes, c.no);
    }).catch(function() {
        // Если API не ответил — всё равно засчитываем локально и показываем примерные результаты
        setVoted();
        alert('Голос принят! (результаты обновятся через секунду)');
        getCounts().then(function(c) { showResults(c.yes, c.no); });
    }).then(function() {
        voting = false;
        btn.textContent = origText;
        btn.disabled = false;
    });
};

// ---- reset: три быстрых тапа по эмодзи ----

var taps = [];
document.addEventListener('click', function(e) {
    if (!e.target.closest('.emoji')) return;
    var now = Date.now();
    taps.push(now);
    taps = taps.filter(function(t) { return now - t < 1500; });
    if (taps.length >= 3) {
        taps = [];
        clearVoted();
        showVoteScreen();
        if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
    }
});

// ---- init ----

if (voted()) {
    getCounts().then(function(c) { showResults(c.yes, c.no); });
} else {
    getCounts(); // подгружаем фоном
}

})();
</script>

</body>
</html>
